<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sistema solare</title>
<link rel="stylesheet" href="style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

    <header>
        <h1>Sistema Solare</h1>
    </header>
    <section id="sistema-solare">
        <canvas></canvas>
        <div class="sole">
            <img src="immagini/sole.png" alt="Sole">
        </div>
        <div id="tooltip" class="tooltip-nascosto"></div>

        <div class="freccia-scopri">
            <span>the more you know</span>
            <div class="freccia-icona">↓</div>
        </div>
    </section>
    <section id="enciclopedia">
        <nav class="selettore-pianeti">
            <span class="indicatore-attivo"></span>
        </nav>

        <div class="contenuto-scheda">
            <button class="freccia-nav freccia-sx" aria-label="pianeta precedente">◀</button>

            <div class="area-modello">
                <div class="placeholder-video">
                    <span id="nome-placeholder">Mercurio</span>
                </div>
                <div class="note-lune">
                    <span class="asterisco">*</span>
                    <span id="testo-lune" class="testo-lune"></span>
                </div>
            </div>

            <div class="area-info">
                <h2 id="scheda-titolo">Mercurio</h2>
                <p id="scheda-descrizione">Descrizione del pianeta...</p>
            </div>

            <button class="freccia-nav freccia-dx" aria-label="Pianeta successivo">▶</button>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
